<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <canvas id="gameCanvas" width="1000px" height="675px" style="border:1px solid #d3d3d3;"></canvas>
    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        function checkCollision(rect1, rect2) {
            return (
                rect1.x < rect2.x + rect2.width &&
                rect1.x + rect1.width > rect2.x &&
                rect1.y < rect2.y + rect2.height &&
                rect1.y + rect1.height > rect2.y
            );
        }

        let score = 0;
        let gameOver = false;
        let baseSpeed = 1;
        let roadOffset = 0;
        let coins = [];
        let coinTimer = 0;
        const coinFrequency = 150;

        let obstacles = [];
        let obstacleTimer = 0;
        const obstacleFrequency = 180;
        const car = {
            x: 475,
            y: 600,
            width: 50,
            height: 80,
            turnLeft: function () {
                if (this.x > 200) {
                    this.x -= 350;
                }
            },
            turnRight: function () {
                if (this.x < 750) {
                    this.x += 350;
                }
            },
            draw: function () {
                ctx.fillStyle = 'blue';
                ctx.fillRect(this.x, this.y, this.width, this.height);
            }
        };

        function drawRoad() {
            ctx.fillStyle = '#333333';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.strokeStyle = '#FFFFFF';
            ctx.lineWidth = 10;
            ctx.setLineDash([40, 40]);

            roadOffset -= baseSpeed * 5;
            ctx.lineDashOffset = roadOffset;

            ctx.beginPath();
            ctx.moveTo(333, 0);
            ctx.lineTo(333, canvas.height);
            ctx.moveTo(666, 0);
            ctx.lineTo(666, canvas.height);
            ctx.stroke();
            ctx.setLineDash([]);
        }

        function handleCoins() {
            coinTimer++;
            if (coinTimer % coinFrequency === 0) {
                const lanes = [150, 500, 850];
                const randomX = lanes[Math.floor(Math.random() * lanes.length)] - 15;
                coins.push({
                    x: randomX,
                    y: -50,
                    width: 30,
                    height: 30,
                    color: 'gold'
                });
            }

            for (let i = 0; i < coins.length; i++) {
                let coin = coins[i];
                coin.y += baseSpeed;

                ctx.beginPath();
                ctx.arc(coin.x + 15, coin.y + 15, 15, 0, Math.PI * 2);
                ctx.fillStyle = coin.color;
                ctx.fill();
                ctx.closePath();

                if (checkCollision(car, coin)) {
                    score += 10;
                    coins.splice(i, 1);
                    i--;
                    continue;
                }

                if (coin.y > canvas.height) {
                    coins.splice(i, 1);
                    i--;
                }
            }
        }

        function handleObstacles() {
            obstacleTimer++;
            if (obstacleTimer % obstacleFrequency === 0) {
                const lanes = [150, 500, 850];
                const randomX = lanes[Math.floor(Math.random() * lanes.length)] - 25;
                let newObstacle = {
                    x: randomX,
                    y: -50,
                    width: 50,
                    height: 50,
                    color: 'red'
                };
                obstacles.push(newObstacle);
            }

            for (let i = 0; i < obstacles.length; i++) {
                let obs = obstacles[i];

                obs.y += baseSpeed;
                ctx.fillStyle = obs.color;
                ctx.fillRect(obs.x, obs.y, obs.width, obs.height);

                if (checkCollision(car, obs)) {
                    gameOver = true;
                }
                if (obs.y > canvas.height) {
                    obstacles.splice(i, 1);
                    i--;
                }
            }
        }

        window.addEventListener('keydown', function moveSelection(evt) {
            switch (evt.keyCode) {
                case 65:
                    car.turnLeft();
                    break;
                case 68:
                    car.turnRight();
                    break;
                case 87:
                    if (baseSpeed < 10) {
                        baseSpeed++;
                    }
                    break;
                case 83:
                    if (baseSpeed > 1) {
                        baseSpeed--;
                    }
                    break;
            }
        });

        function gameLoop() {
            if (gameOver === true) {
                ctx.fillStyle = "red";
                ctx.font = "bold 60px Arial";
                ctx.textAlign = "center";
                ctx.fillText("GAME OVER", canvas.width / 2, canvas.height / 2);

                ctx.fillStyle = "white";
                ctx.font = "20px Arial";
                ctx.fillText("Nhấn F5 để chơi lại", canvas.width / 2, canvas.height / 2 + 50);
                return;
            }

            ctx.clearRect(0, 0, canvas.width, canvas.height);

            drawRoad();
            handleCoins();
            handleObstacles();
            car.draw();

            ctx.fillStyle = "white";
            ctx.font = "bold 24px Arial";
            ctx.textAlign = "left";
            ctx.fillText("Speed: " + baseSpeed, 20, 40);

            ctx.fillStyle = "gold";
            ctx.textAlign = "right";
            ctx.fillText("Score: " + score, canvas.width - 20, 40);
            ctx.textAlign = "left";

            requestAnimationFrame(gameLoop);
        }
        gameLoop();

    </script>
</body>

</html>
