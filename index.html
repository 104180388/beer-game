<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
        #gameCanvas {
            border: 1px solid #d3d3d3;
            background-image: url('img/bar.gif'); 
            background-size: cover; 
            background-position: center;
            background-repeat: no-repeat;
            border:1px solid #d3d3d3;
        }
    </style>

</head>

<body>
    <canvas id="gameCanvas" width="1000px" height="675px"></canvas>
    <script src="js/tray.js"></script>
    <script src="js/life.js"></script>
    <script src="js/beer.js"></script>
    <script src="js/trash.js"></script>
    <script src="js/difficult.js"></script>
    <script>
        let frames = 0;
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        let score = 0;
        let gameOver = false;

        function gameLoop() {
            if (gameOver === true) {
                ctx.fillStyle = "red";
                ctx.font = "bold 60px Arial";
                ctx.textAlign = "center";
                ctx.fillText("GAME OVER", canvas.width / 2, canvas.height / 2);

                ctx.fillStyle = "black";
                ctx.font = "20px Arial";
                ctx.fillText("Nhấn F5 để chơi lại", canvas.width / 2, canvas.height / 2 + 50);
                return;
            }
            if(score==100){
                hard()
            }
            else if(score==200){
                nightmare()
            }
            
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            ctx.font = "bold 20px Arial";
            ctx.fillStyle = "gold";

            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillText("Score: " + score, 20, 40);

            tray.draw();
            tray.update();

            life.draw();
            
            handleBeers();
            handleTrashes();

            requestAnimationFrame(gameLoop);
        }
        gameLoop();
    </script>

</body>


</html>
